<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dungeon Base</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  </head>
  <body class="subpage-body">
    <main class="subpage-layout">
      <header class="subpage-header">
        <h1>Dungeon Base</h1>
        <div class="subpage-stats">
          <span>닉네임: <strong id="dungeon-name">-</strong></span>
          <span>HP: <strong id="dungeon-hp">-</strong></span>
          <span>Coin: <strong id="dungeon-coin">-</strong></span>
        </div>
        <div class="subpage-actions">
          <a class="link-btn" href="/">로비 복귀</a>
          <a class="link-btn" href="/game">미니게임 허브</a>
        </div>
      </header>

      <section class="subpage-content">
        <canvas id="dungeon-canvas" width="1280" height="720"></canvas>
        <aside class="subpage-panel">
          <h2>던전 서버 상태</h2>
          <div id="dungeon-status" class="status-grid"></div>
          <h2>몹 레퍼런스</h2>
          <div id="dungeon-monster-list" class="monster-list"></div>
          <h2>던전 로그</h2>
          <div id="dungeon-feed" class="feed"></div>
          <p class="hint-text">몹은 서버 기준으로 저장되며, 페이지를 나갔다 와도 같은 던전 ID면 유지됩니다.</p>
          <p class="hint-text">전투는 아직 미구현이며 공격 예약 키 훅만 연결됩니다: Z / X / C</p>
        </aside>
      </section>
    </main>

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="{{ url_for('static', filename='dungeon.js') }}"></script>
  </body>
</html>
