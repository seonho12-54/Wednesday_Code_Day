<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mini Game Hub Base</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  </head>
  <body class="subpage-body">
    <main class="subpage-layout game-layout">
      <header class="subpage-header">
        <h1>Mini Game Hub Base</h1>
        <div class="subpage-stats">
          <span>닉네임: <strong id="game-name">-</strong></span>
          <span>HP: <strong id="game-hp">-</strong></span>
          <span>Coin: <strong id="game-coin">-</strong></span>
        </div>
        <div class="subpage-actions">
          <a class="link-btn" href="/">로비 복귀</a>
          <a class="link-btn" href="/dungeon">던전 이동</a>
        </div>
      </header>

      <section class="subpage-content game-content">
        <section class="tile">
          <h2>세션 정보</h2>
          <p>미니게임 세션 ID: <strong id="game-session">-</strong></p>
          <p id="game-party">파티 정보 대기중</p>
        </section>

        <section class="tile">
          <h2>코인 사용 슬롯</h2>
          <p>입장비/베팅/보상 정산 로직을 연결할 영역입니다.</p>
          <button id="coin-action" type="button">코인 사용 훅 테스트 (UI 전용)</button>
          <div id="coin-log" class="feed short-feed"></div>
        </section>

        <section class="tile">
          <h2>미니게임 연결 예정</h2>
          <ul class="intro-list compact">
            <li>우클릭 신청-수락으로 `/game` 진입</li>
            <li>던전에서 얻은 코인 사용</li>
            <li>실제 미니게임 콘텐츠는 분업 구현 예정</li>
          </ul>
        </section>
      </section>
    </main>

    <script src="{{ url_for('static', filename='game.js') }}"></script>
  </body>
</html>
